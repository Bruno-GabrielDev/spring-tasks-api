# ============================================================
# Workflow 1: Integração Contínua (CI)
# Disparado em todo push ou Pull Request para main/develop
# Executa: compilação + testes unitários + testes de integração
# ============================================================

name: CI - Build & Test1

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  # ----------------------------------------------------------
  # Job 1: Compilar o projeto
  # ----------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # Cache das dependências Maven para acelerar builds futuros

      - name: Compilar sem executar testes
        run: mvn compile --no-transfer-progress

      - name: Empacotar aplicação (gerar JAR)
        run: mvn package -DskipTests --no-transfer-progress

      - name: Salvar artefato JAR para jobs seguintes
        uses: actions/upload-artifact@v4
        with:
          name: tasks-api-jar
          path: target/tasks-api.jar
          retention-days: 1     # Mantém o artefato por 1 dia (só precisamos para o workflow atual)

  # ----------------------------------------------------------
  # Job 2: Testes Unitários
  # Depende do job 'build' ter terminado com sucesso
  # ----------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build              # Só roda se o build passar

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes unitários (TaskServiceTest)
        run: mvn test --no-transfer-progress -Dtest=TaskServiceTest

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()            # Publica mesmo se os testes falharem
        with:
          name: unit-test-report
          path: target/surefire-reports/

  # ----------------------------------------------------------
  # Job 3: Testes de Integração (Controller + Web Layer)
  # Também depende do job 'build'
  # ----------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes de integração (TaskControllerTest)
        run: mvn test --no-transfer-progress -Dtest=TaskControllerTest

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: target/surefire-reports/

  # ----------------------------------------------------------
  # Job 4: Relatório consolidado
  # Roda depois de AMBOS os jobs de teste
  # ----------------------------------------------------------
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]
    if: always()              # Sempre roda para exibir o status final

    steps:
      - name: Imprimir resultado dos testes
        run: |
          echo "======================================"
          echo " CI Pipeline finalizado"
          echo " Unit Tests:        ${{ needs.unit-tests.result }}"
          echo " Integration Tests: ${{ needs.integration-tests.result }}"
          echo "======================================"
