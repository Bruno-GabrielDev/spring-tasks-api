# ============================================================
# Workflow 2: Deploy Automático (CD)
# Disparado ao criar uma tag de versão (ex: v1.0.0, v2.1.3)
# Executa: testes → build JAR → cria GitHub Release com o artefato
#
# Para acionar: git tag v1.0.0 && git push origin v1.0.0
# ============================================================

name: CD - Deploy & Release

on:
  push:
    tags:
      - 'v*.*.*'              # Aceita tags no formato v1.0.0, v2.3.1, etc.

jobs:

  # ----------------------------------------------------------
  # Job 1: Executar todos os testes antes de fazer deploy
  # Garante que nunca fazemos deploy de código quebrado
  # ----------------------------------------------------------
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Executar todos os testes
        run: mvn test --no-transfer-progress

  # ----------------------------------------------------------
  # Job 2: Build do artefato de produção
  # ----------------------------------------------------------
  build:
    name: Build Production JAR
    runs-on: ubuntu-latest
    needs: test               # Só faz build se os testes passarem

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Gerar JAR de produção
        run: mvn package -DskipTests --no-transfer-progress

      - name: Renomear JAR com a versão da tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv target/tasks-api.jar target/tasks-api-${VERSION}.jar
          echo "JAR_NAME=tasks-api-${VERSION}.jar" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Salvar JAR versionado como artefato
        uses: actions/upload-artifact@v4
        with:
          name: production-jar
          path: target/${{ env.JAR_NAME }}

  # ----------------------------------------------------------
  # Job 3: Criar GitHub Release e anexar o JAR
  # ----------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write         # Permissão para criar releases

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # Busca todo o histórico para gerar changelog

      - name: Definir variáveis da versão
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "JAR_NAME=tasks-api-${VERSION}.jar" >> $GITHUB_ENV

      - name: Baixar JAR gerado no job anterior
        uses: actions/download-artifact@v4
        with:
          name: production-jar
          path: ./release-assets

      - name: Gerar changelog automático (commits desde a última tag)
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" | head -20)
          else
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          body: |
            ## 🚀 Tasks API — ${{ env.VERSION }}

            ### O que mudou
            ${{ env.CHANGELOG }}

            ### Como executar
            ```bash
            java -jar ${{ env.JAR_NAME }}
            ```
            A API estará disponível em: `http://localhost:8080/api/tasks`

            ### Endpoints disponíveis
            | Método | Rota | Descrição |
            |--------|------|-----------|
            | GET | /api/tasks | Listar todas as tarefas |
            | GET | /api/tasks/{id} | Buscar por ID |
            | POST | /api/tasks | Criar nova tarefa |
            | PUT | /api/tasks/{id} | Atualizar tarefa |
            | DELETE | /api/tasks/{id} | Remover tarefa |
          files: ./release-assets/${{ env.JAR_NAME }}
          draft: false
          prerelease: false

  # ----------------------------------------------------------
  # Job 4: Simular deploy em servidor (ex: Render / Railway)
  # Em produção real, este job executaria comandos SSH ou CLI
  # do provedor de cloud. Aqui simulamos para fins didáticos.
  # ----------------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: release
    environment: production   # Ambiente "production" (pode ter aprovação manual no GitHub)

    steps:
      - name: Simular deploy em servidor
        run: |
          echo "=============================================="
          echo " Iniciando deploy da versão ${{ env.VERSION }}"
          echo " Servidor: tasks-api.exemplo.com"
          echo "=============================================="
          sleep 2
          echo "✅ JAR enviado para o servidor"
          sleep 1
          echo "✅ Serviço reiniciado"
          sleep 1
          echo "✅ Health check: OK"
          echo "=============================================="
          echo " Deploy concluído com sucesso!"
          echo "=============================================="
        env:
          VERSION: ${{ github.ref_name }}

      # Em um deploy real, você usaria algo como:
      #
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SERVER_HOST }}
      #     username: ${{ secrets.SERVER_USER }}
      #     key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     script: |
      #       cd /opt/tasks-api
      #       wget https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/tasks-api-${{ env.VERSION }}.jar
      #       systemctl restart tasks-api
